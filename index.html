<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sardius Media</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <!-- ===== GRID VIEW ===== -->
  <div id="grid-view">
    <!-- Header -->
    <header class="header">
      <div class="header__left">
        <div class="header__logo">S</div>
        <span class="header__brand">Sardius Media</span>
      </div>
      <span class="header__powered">Powered by Sardius</span>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="search-input"
        class="search-bar__input"
        placeholder="Search videos..."
        maxlength="200"
      />
    </div>

    <!-- Category Pills -->
    <div class="category-pills" id="category-pills">
      <button class="pill pill--active" data-category="">All</button>
    </div>

    <!-- Speaker Filter -->
    <div class="speaker-filter-row" id="speaker-filter-row" hidden>
      <select id="speaker-filter" class="speaker-select">
        <option value="">All Speakers</option>
      </select>
    </div>

    <!-- Main Content -->
    <main>
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading videos...</p>
      </div>
      <div id="grid" class="grid"></div>
      <div id="empty-state" class="empty-state" hidden>
        <p>No results found. Try adjusting your filters.</p>
      </div>
      <button id="load-more" class="load-more" hidden>
        Load More <span class="load-more__chevron">&#8964;</span>
      </button>
    </main>
  </div>

  <!-- ===== DETAIL VIEW ===== -->
  <div id="detail-view" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
